<!DOCTYPE html>
<html>

<head>
    <title>FIFA World Cup Predictor</title>
    <link
        rel="stylesheet"
        href="/static/style.css"
    >
</head>

<body>

<div class="container">

    <h1>
        ⚽ FIFA World Cup Predictor
    </h1>

    <form
        action="/predict"
        method="post"
    >

        <label>
            Fixture
        </label>

        <select name="fixture" required>

            {% for fixture in fixtures %}

            <option
                value="{{ fixture.home_team }}|||{{ fixture.away_team }}"
            >
                {{ fixture.label }}
            </option>

            {% endfor %}

        </select>

        <button type="submit">
            Predict Match
        </button>

    </form>

    {% if prediction %}

    <div class="result">

        <h2>
            {{ home_team }}
            vs
            {{ away_team }}
        </h2>

        <h3>
            Prediction:
            {{ prediction }}
        </h3>

    </div>

    {% endif %}

</div>

</body>

</html>
