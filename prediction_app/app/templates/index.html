<!DOCTYPE html>
<html>

<head>
    <title>FIFA World Cup Predictor</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">

    <h1>⚽ FIFA World Cup Predictor</h1>

    <form action="/predict" method="post">

        <label>Home Team</label>

        <select name="home_team">
            {% for team in teams %}
            <option value="{{ team }}">
                {{ team }}
            </option>
            {% endfor %}
        </select>

        <label>Away Team</label>

        <select name="away_team">
            {% for team in teams %}
            <option value="{{ team }}">
                {{ team }}
            </option>
            {% endfor %}
        </select>

        <button type="submit">
            Predict Match
        </button>

    </form>

    {% if prediction %}

    <div class="result">

        <h2>
            {{ home_team }}
            vs
            {{ away_team }}
        </h2>

        <h3>
            Prediction:
            {{ prediction }}
        </h3>

    </div>

    {% endif %}

</div>

</body>

</html>
